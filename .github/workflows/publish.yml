name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            manylinux: "off"

          - os: macos-latest
            target: aarch64-apple-darwin
            manylinux: "off"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Ensure secret exists
        shell: bash
        run: |
          if [ -z "${KDSKILLHUB_DEFAULT_TOKEN:-}" ]; then
            echo "KDSKILLHUB_DEFAULT_TOKEN secret is required" >&2
            exit 1
          fi
        env:
          KDSKILLHUB_DEFAULT_TOKEN: ${{ secrets.KDSKILLHUB_DEFAULT_TOKEN }}

      - name: Set Linux ARM64 CFLAGS
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          echo 'CFLAGS_aarch64_unknown_linux_gnu=-D__ARM_ARCH=8' >> "$GITHUB_ENV"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.11.5
          manylinux: ${{ matrix.manylinux }}
          target: ${{ matrix.target }}
          args: --release --out dist --bindings bin --compatibility pypi
          before-script-linux: |
            if command -v yum >/dev/null 2>&1; then
              yum install -y perl-core
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y perl-core
            fi
            perl -MIPC::Cmd -MTime::Piece -e 'print "Perl OpenSSL build deps OK\n"'
        env:
          KDSKILLHUB_DEFAULT_TOKEN: ${{ secrets.KDSKILLHUB_DEFAULT_TOKEN }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: dist-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1