name: publish

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build and attach assets to, e.g. v3.2.0"
        required: true
        type: string
      publish_pypi:
        description: "Publish downloaded wheels to PyPI"
        required: true
        default: false
        type: boolean
      publish_package_managers:
        description: "Update Homebrew, WinGet, and Launchpad PPA"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            manylinux: "off"

          - os: macos-15-intel
            target: x86_64-apple-darwin
            manylinux: "off"

          - os: macos-latest
            target: aarch64-apple-darwin
            manylinux: "off"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name || github.event.inputs.tag }}

      - name: Ensure secret exists
        shell: bash
        run: |
          if [ -z "${KDSKILLHUB_DEFAULT_TOKEN:-}" ]; then
            echo "KDSKILLHUB_DEFAULT_TOKEN secret is required" >&2
            exit 1
          fi
        env:
          KDSKILLHUB_DEFAULT_TOKEN: ${{ secrets.KDSKILLHUB_DEFAULT_TOKEN }}

      - name: Set Linux ARM64 CFLAGS
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          echo 'CFLAGS_aarch64_unknown_linux_gnu=-D__ARM_ARCH=8' >> "$GITHUB_ENV"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.11.5
          manylinux: ${{ matrix.manylinux }}
          target: ${{ matrix.target }}
          args: --release --out dist --bindings bin --compatibility pypi
          before-script-linux: |
            if command -v yum >/dev/null 2>&1; then
              yum install -y perl-core
            elif command -v dnf >/dev/null 2>&1; then
              dnf install -y perl-core
            fi
            perl -MIPC::Cmd -MTime::Piece -e 'print "Perl OpenSSL build deps OK\n"'
        env:
          KDSKILLHUB_DEFAULT_TOKEN: ${{ secrets.KDSKILLHUB_DEFAULT_TOKEN }}

      - name: Package release asset
        shell: bash
        run: |
          python scripts/packaging/package-release-asset.py \
            --target "${{ matrix.target }}" \
            --out release-assets

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.target }}
          path: dist

      - name: Upload release asset artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ matrix.target }}
          path: release-assets

  release-assets:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-dist
          merge-multiple: true

      - name: Generate SHA256SUMS
        shell: bash
        run: |
          find release-dist -maxdepth 1 -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | xargs -0 sha256sum > release-dist/SHA256SUMS.txt

      - name: Upload assets to GitHub Release
        shell: bash
        run: |
          gh release upload "$RELEASE_TAG" release-dist/* \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  publish-pypi:
    needs: build
    if: github.event_name == 'release' || github.event.inputs.publish_pypi == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: wheels-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

