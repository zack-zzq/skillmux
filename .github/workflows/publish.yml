name: publish
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64
          - os: ubuntu-latest
            target: aarch64
          - os: windows-latest
            target: x64
          - os: windows-latest
            target: ARM64
          - os: macos-13
            target: x86_64
          - os: macos-latest
            target: aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: ensure secret exists
        shell: bash
        run: |
          if [ -z "${KDSKILLHUB_DEFAULT_TOKEN:-}" ]; then
            echo "KDSKILLHUB_DEFAULT_TOKEN secret is required" >&2
            exit 1
          fi
        env:
          KDSKILLHUB_DEFAULT_TOKEN: ${{ secrets.KDSKILLHUB_DEFAULT_TOKEN }}
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: auto
          args: --release --out dist
          target: ${{ matrix.target }}
        env:
          KDSKILLHUB_DEFAULT_TOKEN: ${{ secrets.KDSKILLHUB_DEFAULT_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.target }}
          path: dist
  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
