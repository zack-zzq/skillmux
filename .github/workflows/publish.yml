name: publish

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            manylinux: "2014"

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            manylinux: "2014"

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            manylinux: "off"

          - os: windows-latest
            target: aarch64-pc-windows-msvc
            manylinux: "off"

          - os: macos-13
            target: x86_64-apple-darwin
            manylinux: "off"

          - os: macos-latest
            target: aarch64-apple-darwin
            manylinux: "off"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Ensure secret exists
        shell: bash
        run: |
          if [ -z "${KDSKILLHUB_DEFAULT_TOKEN:-}" ]; then
            echo "KDSKILLHUB_DEFAULT_TOKEN secret is required" >&2
            exit 1
          fi
        env:
          KDSKILLHUB_DEFAULT_TOKEN: ${{ secrets.KDSKILLHUB_DEFAULT_TOKEN }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          maturin-version: v1.11.5
          manylinux: ${{ matrix.manylinux }}
          target: ${{ matrix.target }}
          args: --release --out dist --bindings bin --compatibility pypi
        env:
          KDSKILLHUB_DEFAULT_TOKEN: ${{ secrets.KDSKILLHUB_DEFAULT_TOKEN }}

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1